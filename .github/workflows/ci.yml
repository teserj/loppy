name: CI

on:
  push:
    branches: [main, master, develop, feat/*, bugfix/*]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run all tests
        run: |
          cd $GITHUB_WORKSPACE
          bats tests/**/*.bats
        continue-on-error: false

      - name: Validate plugin.json
        run: |
          jq . .claude-plugin/plugin.json > /dev/null
          echo "✓ plugin.json is valid JSON"

      - name: Validate plugin schema
        run: |
          # Check required fields
          jq -e '.name and .version and .description' .claude-plugin/plugin.json > /dev/null
          echo "✓ plugin.json has required metadata"

          # Check commands
          jq -e '.commands | length > 0' .claude-plugin/plugin.json > /dev/null
          echo "✓ plugin.json has commands"

          # Check hooks
          jq -e '.hooks | length > 0' .claude-plugin/plugin.json > /dev/null
          echo "✓ plugin.json has hooks"

          # Check slash commands
          jq -e '.slashCommands | length > 0' .claude-plugin/plugin.json > /dev/null
          echo "✓ plugin.json has slash commands"

      - name: Check documentation
        run: |
          [[ -f CLAUDE.md ]] && echo "✓ CLAUDE.md exists" || exit 1
          [[ -f README.md ]] && echo "✓ README.md exists" || exit 1
          grep -q "## " CLAUDE.md && echo "✓ CLAUDE.md has sections" || exit 1
          grep -q "## " README.md && echo "✓ README.md has sections" || exit 1

      - name: Verify no hardcoded paths
        run: |
          echo "Checking for hardcoded paths..."

          # Check for common problematic patterns
          ! grep -r "/home/" --include="*.sh" --include="*.js" tests/ scripts/ bin/ || exit 1
          ! grep -r "/tmp/" --include="*.sh" --include="*.js" bin/loppy commands/ || exit 1

          echo "✓ No suspicious hardcoded paths found"

      - name: Run validation script
        run: |
          bash scripts/validate.sh

  lint:
    name: Lint and Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check shell script syntax
        run: |
          for f in setup.sh bin/loppy hooks/*.sh scripts/*.sh; do
            [[ -f "$f" ]] && bash -n "$f" && echo "✓ $f" || exit 1
          done

      - name: Check for trailing whitespace
        run: |
          ! grep -r ' $' --include="*.md" --include="*.sh" --include="*.js" . || true
          echo "✓ No significant trailing whitespace"

  doc-check:
    name: Documentation Consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify command docs match implementation
        run: |
          # Check that all commands mentioned in docs exist in bin/loppy
          commands="config next move index-merge log lint-frontmatter"
          for cmd in $commands; do
            grep -q "cmd_$cmd" bin/loppy || exit 1
            grep -q "$cmd" CLAUDE.md || exit 1
            grep -q "$cmd" README.md || exit 1
            echo "✓ Command $cmd documented"
          done

      - name: Verify subcommand docs match /wiki implementation
        run: |
          # Check that /wiki subcommands are documented
          subs="ingest query lint"
          for sub in $subs; do
            grep -q "$sub" commands/wiki.js || exit 1
            grep -q "$sub" CLAUDE.md || exit 1
            grep -q "$sub" README.md || exit 1
            echo "✓ Subcommand /wiki $sub documented"
          done
